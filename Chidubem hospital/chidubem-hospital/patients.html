<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Management - Chidubem Hospital</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">🏥</div>
        <h2>Chidubem</h2>
      </div>
      <nav class="sidebar-links">
        <a href="dashboard.html">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="patients.html" class="active">
          <span class="icon">👥</span>
          <span>Patients</span>
        </a>
        <a href="#" onclick="logout(); return false;" style="margin-top: auto; color: #ff6b6b;">
          <span class="icon">🚪</span>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="dashboard-header">
        <div>
          <h1>Patient Management</h1>
          <p style="color: var(--text-light);">Manage all registered patients</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('addPatientModal')">
          ➕ Add New Patient
        </button>
      </div>

      <div class="table-container animate-fade">
        <div class="search-bar">
          <input type="text" id="patientSearch" placeholder="Search by name or serial number...">
          <button class="btn btn-primary" onclick="openModal('addPatientModal')">➕ Add Patient</button>
        </div>
        
        <table>
          <thead>
            <tr>
              <th>Patient Name</th>
              <th>Serial Number</th>
              <th>Age</th>
              <th>Gender</th>
              <th>Registration Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="patientTableBody">
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal" id="addPatientModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add New Patient</h2>
        <button class="close-btn" onclick="closeModal('addPatientModal')">✕</button>
      </div>
      <form id="addPatientForm">
        <div class="form-group">
          <label for="fullName">Full Name *</label>
          <input type="text" id="fullName" name="fullName" required placeholder="Enter patient's full name">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="age">Age *</label>
            <input type="number" id="age" name="age" required min="0" max="18" placeholder="Age in years">
          </div>
          <div class="form-group">
            <label for="gender">Gender *</label>
            <select id="gender" name="gender" required style="width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 1rem;">
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number *</label>
          <input type="tel" id="phone" name="phone" required placeholder="Parent/guardian phone number">
        </div>
        <div class="form-group">
          <label for="address">Address *</label>
          <input type="text" id="address" name="address" required placeholder="Full address">
        </div>
        <div class="form-group">
          <label for="regDate">Registration Date *</label>
          <input type="date" id="regDate" name="regDate" required style="width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 1rem;">
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" class="btn btn-outline" onclick="closeModal('addPatientModal')" style="flex: 1;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">Save Patient</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    checkAuth();
    
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('regDate').valueAsDate = new Date();
    });
    
    document.getElementById('addPatientForm').addEventListener('submit', handleAddPatient);
  </script>
</body>
</html>
