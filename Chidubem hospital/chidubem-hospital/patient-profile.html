<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Profile - Chidubem Hospital</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">🏥</div>
        <h2>Chidubem</h2>
      </div>
      <nav class="sidebar-links">
        <a href="dashboard.html">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="patients.html" class="active">
          <span class="icon">👥</span>
          <span>Patients</span>
        </a>
        <a href="#" onclick="logout(); return false;" style="margin-top: auto; color: #ff6b6b;">
          <span class="icon">🚪</span>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="dashboard-header">
        <div>
          <a href="patients.html" style="color: var(--text-light); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
            ← Back to Patients
          </a>
          <h1>Patient Profile</h1>
        </div>
      </div>

      <div class="profile-header animate-fade">
        <div class="profile-avatar">👤</div>
        <div class="profile-info">
          <h2 id="patientName">Loading...</h2>
          <p id="patientSerial">-</p>
          <div class="profile-grid">
            <div class="profile-detail">
              <label>Age</label>
              <span id="detailAge">-</span>
            </div>
            <div class="profile-detail">
              <label>Gender</label>
              <span id="detailGender">-</span>
            </div>
            <div class="profile-detail">
              <label>Phone</label>
              <span id="detailPhone">-</span>
            </div>
            <div class="profile-detail">
              <label>Address</label>
              <span id="detailAddress">-</span>
            </div>
            <div class="profile-detail">
              <label>Registered</label>
              <span id="detailRegDate">-</span>
            </div>
          </div>
        </div>
      </div>

      <input type="hidden" id="patientId">

      <div class="tabs">
        <button class="tab active" data-tab="medical" onclick="switchTab('medical')">📋 Medical Records</button>
        <button class="tab" data-tab="billing" onclick="switchTab('billing')">💰 Billing & Payments</button>
      </div>

      <div id="medical" class="tab-content active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h3>Medical History</h3>
          <button class="btn btn-primary" onclick="openModal('addRecordModal')">➕ Add Record</button>
        </div>
        <div id="medicalRecords"></div>
      </div>

      <div id="billing" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h3>💳 Payment Records</h3>
          <button class="btn btn-primary" onclick="openModal('addPaymentModal')">➕ Add Payment</button>
        </div>
        
        <div class="invoice-section">
          <div id="invoiceList"></div>
        </div>
        
        <div class="invoice-section" style="margin-top: 1.5rem; background: linear-gradient(135deg, #E8F4FD, #F0F7EE);">
          <h4 style="margin-bottom: 1rem;">📊 Payment Summary</h4>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
            <div style="background: white; padding: 1rem; border-radius: 8px; text-align: center;">
              <p style="color: var(--text-light); font-size: 0.9rem;">Total Billed</p>
              <p style="font-size: 1.5rem; font-weight: bold; color: var(--text-dark);" id="totalBilled">$0.00</p>
            </div>
            <div style="background: white; padding: 1rem; border-radius: 8px; text-align: center;">
              <p style="color: var(--text-light); font-size: 0.9rem;">Total Paid</p>
              <p style="font-size: 1.5rem; font-weight: bold; color: #4CAF50;" id="totalPaid">$0.00</p>
            </div>
            <div style="background: white; padding: 1rem; border-radius: 8px; text-align: center;">
              <p style="color: var(--text-light); font-size: 0.9rem;">Balance</p>
              <p style="font-size: 1.5rem; font-weight: bold; color: #f44336;" id="totalBalance">$0.00</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- View Payment Details Modal -->
  <div class="modal" id="viewPaymentModal">
    <div class="modal-content" style="max-width: 550px;">
      <div class="modal-header">
        <h2>💳 Payment Details</h2>
        <button class="close-btn" onclick="closeModal('viewPaymentModal')">✕</button>
      </div>
      <div id="paymentDetails" style="padding: 1rem 0;"></div>
      <div style="margin-top: 1.5rem; text-align: center;">
        <button class="btn btn-outline" onclick="closeModal('viewPaymentModal')">Close</button>
      </div>
    </div>
  </div>

  <!-- Add Medical Record Modal -->
  <div class="modal" id="addRecordModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add Medical Record</h2>
        <button class="close-btn" onclick="closeModal('addRecordModal')">✕</button>
      </div>
      <form id="addRecordForm">
        <div class="form-group">
          <label for="recordDate">Date</label>
          <input type="date" id="recordDate" name="recordDate">
        </div>
        <div class="form-group">
          <label for="diagnosis">Diagnosis *</label>
          <input type="text" id="diagnosis" name="diagnosis" required placeholder="Enter diagnosis">
        </div>
        <div class="form-group">
          <label for="treatment">Treatment *</label>
          <input type="text" id="treatment" name="treatment" required placeholder="Enter treatment plan">
        </div>
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="3" placeholder="Additional notes..."></textarea>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" class="btn btn-outline" onclick="closeModal('addRecordModal')" style="flex: 1;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">Save Record</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Payment Modal -->
  <div class="modal" id="addPaymentModal">
    <div class="modal-content" style="max-width: 550px;">
      <div class="modal-header">
        <h2>Add New Payment</h2>
        <button class="close-btn" onclick="closeModal('addPaymentModal')">✕</button>
      </div>
      <form id="addPaymentForm">
        <div class="form-group">
          <label for="service">Service *</label>
          <select id="service" name="service" required style="width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 1rem;">
            <option value="">Select Service</option>
            <option value="Consultation">Consultation</option>
            <option value="Vaccination">Vaccination</option>
            <option value="Laboratory Test">Laboratory Test</option>
            <option value="X-Ray">X-Ray</option>
            <option value="Procedure">Procedure</option>
            <option value="Medication">Medication</option>
            <option value="Surgery">Surgery</option>
            <option value="Follow-up">Follow-up</option>
            <option value="Bed Charges">Bed Charges</option>
            <option value="Other">Other</option>
          </select>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="amount">Amount ($) *</label>
            <input type="number" id="amount" name="amount" required min="0" step="0.01" placeholder="0.00">
          </div>
          <div class="form-group">
            <label for="paymentDate">Payment Date *</label>
            <input type="date" id="paymentDate" name="paymentDate" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="paymentMethod">Payment Method *</label>
          <select id="paymentMethod" name="paymentMethod" required style="width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 1rem;" onchange="togglePaymentFields()">
            <option value="Cash">💵 Cash</option>
            <option value="Bank Transfer">🏦 Bank Transfer</option>
          </select>
        </div>
        
        <div id="bankTransferFields" style="display: none; background: var(--bg-light); padding: 1rem; border-radius: var(--radius-sm);">
          <div class="form-group">
            <label for="bankName">Select Bank *</label>
            <select id="bankName" name="bankName" style="width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 1rem;">
              <option value="">Select Bank</option>
              <option value="First Bank of Nigeria">First Bank of Nigeria</option>
              <option value="GTBank">GTBank</option>
              <option value="Zenith Bank">Zenith Bank</option>
              <option value="UBA">United Bank for Africa (UBA)</option>
              <option value="Access Bank">Access Bank</option>
              <option value="EcoBank">EcoBank</option>
              <option value="Fidelity Bank">Fidelity Bank</option>
              <option value="Sterling Bank">Sterling Bank</option>
              <option value="Union Bank">Union Bank</option>
              <option value="Other">Other Bank</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tellerNumber">Teller / Transaction Reference</label>
            <input type="text" id="tellerNumber" name="tellerNumber" placeholder="Enter teller number or transaction ID">
          </div>
          <div class="form-group">
            <label for="senderAccount">Sender's Account Name</label>
            <input type="text" id="senderAccount" name="senderAccount" placeholder="Name on sender's account">
          </div>
        </div>
        
        <div class="form-group">
          <label for="paymentNotes">Notes (Optional)</label>
          <textarea id="paymentNotes" name="paymentNotes" rows="2" placeholder="Additional payment notes..."></textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" class="btn btn-outline" onclick="closeModal('addPaymentModal')" style="flex: 1;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">Record Payment</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    checkAuth();
    
    const urlParams = new URLSearchParams(window.location.search);
    const patientId = urlParams.get('id');
    
    document.getElementById('addRecordForm').addEventListener('submit', handleAddRecord);
    document.getElementById('addPaymentForm').addEventListener('submit', handleAddPayment);
    
    document.getElementById('paymentDate').valueAsDate = new Date();
    document.getElementById('recordDate').valueAsDate = new Date();
    
    function togglePaymentFields() {
      const method = document.getElementById('paymentMethod').value;
      const bankFields = document.getElementById('bankTransferFields');
      
      if (method === 'Bank Transfer') {
        bankFields.style.display = 'block';
      } else {
        bankFields.style.display = 'none';
      }
    }
    
    function viewPaymentDetails(invoiceId) {
      const patient = DB.getPatient(patientId);
      const invoice = patient.invoices.find(i => i.id === invoiceId);
      
      if (!invoice) return;
      
      const methodIcon = invoice.paymentMethod === 'Bank Transfer' ? '🏦' : '💵';
      const methodText = invoice.paymentMethod === 'Bank Transfer' ? 'Bank Transfer' : 'Cash Payment';
      
      let bankDetails = '';
      if (invoice.paymentMethod === 'Bank Transfer') {
        bankDetails = `
          <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border);">
            <span style="color: var(--text-light);">Bank</span>
            <span style="font-weight: 500;">${invoice.bankName || 'N/A'}</span>
          </div>
          <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border);">
            <span style="color: var(--text-light);">Teller/Ref Number</span>
            <span style="font-weight: 500;">${invoice.tellerNumber || 'N/A'}</span>
          </div>
          <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border);">
            <span style="color: var(--text-light);">Sender Account</span>
            <span style="font-weight: 500;">${invoice.senderAccount || 'N/A'}</span>
          </div>
        `;
      }
      
      document.getElementById('paymentDetails').innerHTML = `
        <div style="background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 1.5rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem; text-align: center;">
          <p style="font-size: 0.9rem; opacity: 0.9;">Amount Paid</p>
          <p style="font-size: 2rem; font-weight: bold;">${formatCurrency(invoice.amount)}</p>
        </div>
        
        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border);">
          <span style="color: var(--text-light);">Service</span>
          <span style="font-weight: 500;">${invoice.service}</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border);">
          <span style="color: var(--text-light);">Payment Method</span>
          <span style="font-weight: 500;">${methodIcon} ${methodText}</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border);">
          <span style="color: var(--text-light);">Payment Date</span>
          <span style="font-weight: 500;">${formatDate(invoice.paymentDate || invoice.date)}</span>
        </div>
        <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border);">
          <span style="color: var(--text-light);">Status</span>
          <span style="font-weight: 500; color: #4CAF50;">${invoice.paymentStatus || 'Paid'}</span>
        </div>
        ${bankDetails}
        ${invoice.notes ? `
        <div style="padding: 0.75rem 0;">
          <span style="color: var(--text-light); display: block; margin-bottom: 0.5rem;">Notes</span>
          <span style="font-weight: 500;">${invoice.notes}</span>
        </div>
        ` : ''}
      `;
      
      openModal('viewPaymentModal');
    }
    
    if (patientId) {
      renderPatientProfile(patientId);
    } else {
      window.location.href = 'patients.html';
    }
  </script>
</body>
</html>
